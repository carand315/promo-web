<aside
  class="h-screen bg-white border-r border-gray-200 flex flex-col flex-shrink-0 transition-all duration-300 overflow-hidden"
  [class]="collapsed() ? 'w-[72px]' : 'w-60'"
  role="navigation"
  aria-label="Menú de administración"
>

  <!-- Logo -->
  <div class="flex items-center gap-3 px-4 border-b border-gray-100 flex-shrink-0 h-16">
    <div class="w-8 h-8 bg-red-500 rounded-lg flex items-center justify-center flex-shrink-0">
      <span class="text-white text-xs font-bold">DH</span>
    </div>
    @if (!collapsed()) {
      <div class="flex items-center gap-2 overflow-hidden">
        <span class="font-bold text-gray-900 text-sm whitespace-nowrap">
          <span class="text-gray-900">Buen </span><span class="text-red-500">Plan</span>
        </span>
      </div>
    }
  </div>

  <!-- Navigation -->
  <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-5">
    @for (section of navSections; track section.title) {
      <div>
        @if (!collapsed()) {
          <p class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest px-3 mb-1">
            {{ section.title }}
          </p>
        }
        <ul class="space-y-0.5">
          @for (item of section.items; track item.route) {
            <li>
              <a
                [routerLink]="item.route"
                routerLinkActive="bg-red-50 !text-red-600 font-medium"
                [routerLinkActiveOptions]="{ exact: false }"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors"
                [class.justify-center]="collapsed()"
                [attr.aria-label]="item.label"
                [title]="collapsed() ? item.label : ''"
              >
                <i [class]="'pi ' + item.icon + ' text-base flex-shrink-0'"></i>
                @if (!collapsed()) {
                  <span class="text-sm">{{ item.label }}</span>
                }
              </a>
            </li>
          }
        </ul>
      </div>
    }
  </nav>

  <!-- User footer -->
  <div class="border-t border-gray-100 p-3 flex-shrink-0">
    <div class="flex items-center gap-3" [class.justify-center]="collapsed()">
      <div
        class="w-8 h-8 bg-red-500 rounded-full flex items-center justify-center flex-shrink-0"
        aria-hidden="true"
      >
        <span class="text-white text-xs font-semibold">AC</span>
      </div>
      @if (!collapsed()) {
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-900 truncate">Admin Cuenta</p>
          <p class="text-xs text-gray-500 truncate">Administrador</p>
        </div>
      }
    </div>
  </div>

</aside>
