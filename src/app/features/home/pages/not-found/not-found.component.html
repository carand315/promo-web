<div class="min-h-screen bg-brand-crema flex flex-col">

  <!-- Navbar mínimo -->
  <header class="bg-brand-tinto h-16 flex items-center px-6 flex-shrink-0">
    <button
      (click)="irAlInicio()"
      class="flex items-center gap-2 text-white/70 hover:text-white transition-colors"
      aria-label="Ir al inicio"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
      </svg>
      <span class="text-sm font-medium">Volver al portal</span>
    </button>
  </header>

  <!-- Contenido central -->
  <div class="flex-1 flex items-center justify-center px-4 py-16">
    <div class="text-center max-w-md">

      <!-- Ícono animado -->
      <div class="relative inline-block mb-8">
        <div class="w-32 h-32 rounded-full bg-brand-papel border border-gray-100 shadow-lg flex items-center justify-center mx-auto">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-14 h-14 text-brand-coral" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
          </svg>
        </div>
        <!-- Pulso -->
        <span class="absolute inset-0 rounded-full bg-brand-coral/10 opacity-60 animate-ping" style="animation-duration: 2s;"></span>
      </div>

      <!-- Código de error -->
      <p class="text-sm font-bold uppercase tracking-[0.2em] text-brand-coral mb-3">
        Error 404
      </p>

      <!-- Título -->
      <h1
        class="text-4xl sm:text-5xl font-black text-gray-900 mb-4 leading-tight"
        style="font-family: 'Bricolage Grotesque', sans-serif;"
      >
        Plan no encontrado
      </h1>

      <!-- Mensaje -->
      <p class="text-gray-500 text-base leading-relaxed mb-10">
        El plan que buscas no existe, fue eliminado<br class="hidden sm:block">
        o la URL no es válida.
      </p>

      <!-- Acciones -->
      <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
        <button
          (click)="irAlInicio()"
          class="flex items-center gap-2 bg-brand-coral hover:bg-brand-coral-dark active:scale-95 text-white font-semibold px-6 py-3 rounded-full transition-all shadow-lg shadow-brand-tinto/20"
          aria-label="Ver todos los planes"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12 11.204 3.045c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
          </svg>
          Ver todos los planes
        </button>
      </div>

    </div>
  </div>

</div>
