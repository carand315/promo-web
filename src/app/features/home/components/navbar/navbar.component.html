<nav class="sticky top-0 z-[1000] bg-white border-b border-gray-100 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">

    <!-- Logo + Nav -->
    <div class="flex items-center gap-6">
      <a routerLink="/" aria-label="Ir al inicio">
        <app-logo variant="dark" size="sm" />
      </a>

      <nav class="hidden lg:flex items-center gap-1" aria-label="Navegación principal">
        <a
          routerLink="/"
          routerLinkActive="bg-gray-100 text-gray-900"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 transition-colors"
          aria-label="Ir a inicio"
        >
          <i class="pi pi-home text-xs"></i>
          Inicio
        </a>
        <a
          routerLink="/mapa"
          routerLinkActive="!bg-brand-coral/10 !text-brand-coral !border-brand-coral/30"
          class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-semibold text-gray-600 border border-transparent hover:border-brand-coral/30 hover:bg-brand-coral/10 hover:text-brand-coral transition-all duration-200"
          aria-label="Ver mapa de planes"
        >
          <i class="pi pi-map-marker text-sm"></i>
          Mapa de Planes
        </a>
      </nav>
    </div>

    <!-- Derecha: Mapa (mobile) + City selector (desktop) -->
    <div class="flex items-center gap-2">

      <!-- Botón Mapa — solo mobile -->
      <a
        routerLink="/mapa"
        class="lg:hidden flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-semibold text-brand-coral border border-brand-coral/30 bg-brand-coral/5 hover:bg-brand-coral hover:text-white hover:border-brand-coral transition-all duration-200"
        aria-label="Ver mapa de planes"
      >
        <i class="pi pi-map-marker text-sm"></i>
        Mapa
      </a>

      <!-- City picker — solo desktop -->
      <div class="hidden lg:flex items-center gap-1.5 px-3 py-1.5 bg-brand-crema border border-gray-200 rounded-full hover:border-brand-coral/50 transition-colors">
        <i class="pi pi-map-marker text-brand-coral text-xs flex-shrink-0"></i>
        <span class="text-xs text-gray-500 font-medium whitespace-nowrap">Planes en</span>
        <p-select
          [options]="ciudadOptions()"
          [ngModel]="store.ciudadId()"
          (ngModelChange)="store.setCiudad($event)"
          optionLabel="label"
          optionValue="value"
          placeholder="Tu ciudad"
          [checkmark]="true"
          scrollHeight="320px"
          class="city-select-light"
          panelStyleClass="city-panel"
          aria-label="Seleccionar ciudad"
        />
      </div>

    </div>

  </div>
</nav>
