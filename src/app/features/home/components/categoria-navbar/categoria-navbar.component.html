<!-- ── DESKTOP: barra horizontal de pills ── -->
<nav
  class="hidden lg:block bg-white border-b border-gray-100 sticky top-16 z-[998]"
  aria-label="Categorías"
>
  <div class="relative flex items-center">

    <!-- Flecha izquierda -->
    @if (canScrollLeft()) {
      <button
        (click)="scrollPills('left')"
        class="absolute left-0 z-10 h-full px-2 flex items-center bg-gradient-to-r from-white via-white/90 to-transparent text-gray-500 hover:text-brand-coral transition-colors"
        aria-label="Categorías anteriores"
      >
        <i class="pi pi-chevron-left text-sm"></i>
      </button>
    }

    <!-- Scroll container -->
    <div
      #pillsScroll
      class="flex items-center gap-2 px-4 sm:px-6 py-3 overflow-x-auto scrollbar-none scroll-smooth"
      (scroll)="updateScrollState()"
    >

      <!-- "Todas" pill -->
      <button
        class="flex-shrink-0 flex items-center gap-2 px-3.5 py-1.5 rounded-full text-sm font-semibold border transition-all duration-200 whitespace-nowrap"
        [class]="esTodas()
          ? 'border-transparent text-white -translate-y-0.5'
          : 'bg-white border-gray-200 text-gray-600 shadow-sm hover:-translate-y-0.5 hover:shadow-md hover:border-brand-coral/40 hover:text-brand-coral'"
        [style.background-color]="esTodas() ? '#e8342c' : null"
        [style.box-shadow]="esTodas() ? '0 4px 14px rgba(232,52,44,0.35)' : null"
        (click)="seleccionarTodas()"
        aria-label="Ver todos los planes"
      >
        <span
          class="w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0"
          [class]="esTodas() ? 'bg-white/20' : 'bg-brand-coral/10'"
        >
          <svg xmlns="http://www.w3.org/2000/svg"
            class="h-3 w-3 flex-shrink-0"
            [class]="esTodas() ? 'text-white' : 'text-brand-coral'"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
          </svg>
        </span>
        <span>Todas</span>
        <span
          class="text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[1.25rem] text-center"
          [class]="esTodas() ? 'bg-white/25 text-white' : 'bg-gray-100 text-gray-500'"
        >{{ totalPromos() }}</span>
      </button>

      <!-- Pills de categorías -->
      @for (cat of categorias(); track cat.id) {
        <button
          class="flex-shrink-0 flex items-center gap-2 px-3.5 py-1.5 rounded-full text-sm font-semibold border transition-all duration-200 whitespace-nowrap"
          [class]="categoriaActivaId() === cat.id
            ? 'border-transparent text-white -translate-y-0.5'
            : 'bg-white border-gray-200 text-gray-600 shadow-sm hover:-translate-y-0.5 hover:shadow-md'"
          [style.background-color]="categoriaActivaId() === cat.id ? (cat.colorHex ?? '#e8342c') : null"
          [style.box-shadow]="categoriaActivaId() === cat.id ? ('0 4px 14px ' + chipBg(cat.colorHex, 0.4)) : null"
          (click)="seleccionarCategoria(cat)"
          [attr.aria-label]="'Ver planes de ' + cat.nombre"
          [attr.aria-current]="categoriaActivaId() === cat.id ? 'page' : null"
        >
          <!-- Ícono con tint del color de categoría -->
          <span
            class="w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0"
            [style.background-color]="categoriaActivaId() === cat.id ? 'rgba(255,255,255,0.22)' : chipBg(cat.colorHex, 0.14)"
          >
            <span
              class="material-symbols-outlined text-[12px] leading-none"
              [style.color]="categoriaActivaId() === cat.id ? 'white' : (cat.colorHex ?? '#94a3b8')"
            >{{ cat.icono }}</span>
          </span>
          <span>{{ cat.nombre }}</span>
          <span
            class="text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[1.25rem] text-center"
            [class]="categoriaActivaId() === cat.id ? 'bg-white/25 text-white' : 'bg-gray-100 text-gray-500'"
          >{{ cat.totalPromociones }}</span>
        </button>
      }

    </div>

    <!-- Flecha derecha -->
    @if (canScrollRight()) {
      <button
        (click)="scrollPills('right')"
        class="absolute right-0 z-10 h-full px-2 flex items-center bg-gradient-to-l from-white via-white/90 to-transparent text-gray-500 hover:text-brand-coral transition-colors"
        aria-label="Más categorías"
      >
        <i class="pi pi-chevron-right text-sm"></i>
      </button>
    }

  </div>
</nav>

<!-- ── MÓVIL: botón trigger + drawer ── -->
<div class="lg:hidden">
  <!-- Fila: Categorías | Ciudad (mismo estilo) -->
  <div class="flex items-center justify-between px-4 py-3 bg-white border-b border-gray-200">

    <!-- Categorías -->
    <button
      class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl border border-gray-200 shadow-sm text-sm font-medium text-gray-700"
      (click)="toggleDrawer()"
      aria-label="Abrir categorías"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-brand-coral" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25H12" />
      </svg>
      <span>Categorías</span>
      @if (categoriaActivaId() !== null) {
        <span class="ml-auto w-2 h-2 rounded-full bg-brand-coral"></span>
      }
    </button>

    <!-- City selector — estilo igual a Categorías -->
    <div class="flex items-center gap-1.5 px-3 py-1.5 bg-white rounded-xl border border-gray-200 shadow-sm">
      <i class="pi pi-map-marker text-brand-coral text-sm"></i>
      <p-select
        [options]="ciudadOptions()"
        [ngModel]="store.ciudadId()"
        (ngModelChange)="store.setCiudad($event)"
        optionLabel="label"
        optionValue="value"
        [size]="'small'"
        placeholder="Ciudad"
        [checkmark]="true"
        scrollHeight="320px"
        class="city-select-light"
        panelStyleClass="city-panel"
        aria-label="Seleccionar ciudad"
      />
    </div>

  </div>

  <!-- Overlay -->
  @if (drawerOpen()) {
    <div class="fixed inset-0 bg-black/40 z-[1001]" (click)="toggleDrawer()" aria-hidden="true"></div>
  }

  <!-- Drawer -->
  <div
    class="fixed top-0 left-0 h-full z-[1002] flex flex-col bg-white shadow-xl transition-transform duration-300"
    [class]="drawerOpen() ? 'translate-x-0' : '-translate-x-full'"
    style="width:260px"
    role="dialog" aria-label="Categorías"
  >
    <div class="flex items-center justify-between px-4 h-16 bg-brand-tinto border-b border-white/10 flex-shrink-0">
      <span class="text-xs font-bold uppercase tracking-[0.15em] text-white/50">Categorías</span>
      <button class="text-white/40 hover:text-white/80 p-1 rounded" (click)="toggleDrawer()" aria-label="Cerrar">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    <div class="flex-1 overflow-y-auto">
      <ng-container *ngTemplateOutlet="listaItems" />
    </div>
  </div>
</div>

<!-- ── Templates compartidos ── -->

<ng-template #listaItems>
  <ul class="py-1" role="list">

    <!-- Todas -->
    <li>
      <button
        class="group w-full flex items-center gap-2.5 px-3 py-1.5 text-left transition-colors relative"
        [class]="esTodas()
          ? 'text-brand-coral font-semibold bg-brand-crema before:absolute before:left-0 before:top-1.5 before:bottom-1.5 before:w-0.5 before:bg-brand-coral before:rounded-r'
          : 'text-gray-600 hover:bg-gray-50'"
        (click)="seleccionarTodas()"
        aria-label="Ver todos los planes"
        [pTooltip]="sidebar.collapsed() ? 'Todas' : ''"
        tooltipPosition="right"
      >
        <!-- Chip con animación -->
        <span class="flex-shrink-0 w-7 h-7 rounded-lg flex items-center justify-center
                     transition-transform duration-200 group-hover:scale-110"
          [class]="esTodas() ? 'bg-brand-coral' : 'bg-slate-400'">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
          </svg>
        </span>
        @if (!sidebar.collapsed()) {
          <span class="flex-1 text-sm truncate">Todas</span>
          <span class="flex-shrink-0 text-xs font-semibold px-1.5 py-0.5 rounded-full min-w-[1.5rem] text-center"
            [class]="esTodas() ? 'bg-brand-coral text-white' : 'bg-gray-100 text-gray-500'">
            {{ totalPromos() }}
          </span>
        }
      </button>
    </li>

    <!-- Categorías -->
    @for (cat of categorias(); track cat.id) {
      <li>
        <button
          class="group w-full flex items-center gap-2.5 px-3 py-1.5 text-left transition-colors relative"
          [class]="categoriaActivaId() === cat.id
            ? 'text-brand-coral font-semibold bg-brand-crema before:absolute before:left-0 before:top-1.5 before:bottom-1.5 before:w-0.5 before:bg-brand-coral before:rounded-r'
            : 'text-gray-600 hover:bg-gray-50'"
          (click)="seleccionarCategoria(cat)"
          [attr.aria-label]="'Ver planes de ' + cat.nombre"
          [attr.aria-current]="categoriaActivaId() === cat.id ? 'page' : null"
          [pTooltip]="sidebar.collapsed() ? cat.nombre : ''"
          tooltipPosition="right"
        >
          <!-- Chip con animación -->
          <span class="flex-shrink-0 w-7 h-7 rounded-lg flex items-center justify-center
                       transition-transform duration-200 group-hover:scale-110"
            [style.background-color]="categoriaActivaId() === cat.id ? '#e8342c' : (cat.colorHex ?? '#94a3b8')"
          >
            <span class="material-symbols-outlined text-[17px] leading-none text-white">
              {{ cat.icono }}
            </span>
          </span>
          @if (!sidebar.collapsed()) {
            <span class="flex-1 text-sm truncate">{{ cat.nombre }}</span>
            <span class="flex-shrink-0 text-xs font-semibold px-1.5 py-0.5 rounded-full min-w-[1.5rem] text-center"
              [class]="categoriaActivaId() === cat.id ? 'bg-brand-coral text-white' : 'bg-gray-100 text-gray-500'">
              {{ cat.totalPromociones }}
            </span>
          }
        </button>
      </li>
    }
  </ul>
</ng-template>
