<p-dialog
  [visible]="store.mostrarModalCiudad()"
  (visibleChange)="$event === false && cerrar()"
  [modal]="true"
  [closable]="false"
  [draggable]="false"
  [resizable]="false"
  [dismissableMask]="true"
  [style]="{ width: '420px', 'max-width': '92vw' }"
  styleClass="ciudad-bienvenida-dialog"
  [showHeader]="false"
  aria-labelledby="modal-bienvenida-titulo"
>
  <div class="flex flex-col items-center gap-6 p-8">

    <!-- Logo -->
    <app-logo variant="light" size="md" />

    <!-- Texto de bienvenida -->
    <div class="text-center space-y-2">
      <h2
        id="modal-bienvenida-titulo"
        class="text-white text-xl font-bold"
        style="font-family:'Bricolage Grotesque',sans-serif"
      >
        ¿En qué ciudad estás?
      </h2>
      <p class="text-white/55 text-sm leading-relaxed">
        Seleccioná tu ciudad para ver los mejores<br>
        planes cerca de ti.
      </p>
    </div>

    <!-- Selector de ciudad — mismo estilo que el navbar -->
    <div class="city-picker-shell w-full" style="padding: 0.35rem 0.5rem 0.35rem 0.5rem;">
      <span class="city-picker-glow" aria-hidden="true"></span>
      <span class="city-picker-icon" aria-hidden="true">
        <i class="pi pi-map-marker"></i>
      </span>
      <span class="city-picker-label">Planes en</span>
      <p-select
        [options]="ciudadOptions()"
        [ngModel]="ciudadLocal()"
        (ngModelChange)="ciudadLocal.set($event)"
        optionLabel="label"
        optionValue="value"
        placeholder="Tu ciudad"
        [checkmark]="true"
        scrollHeight="280px"
        appendTo="body"
        class="city-select flex-1"
        panelStyleClass="city-panel"
        aria-label="Seleccionar ciudad"
      />
    </div>

    <!-- Acciones -->
    <div class="flex flex-col gap-3 w-full">
      <button
        class="w-full py-3 rounded-xl text-sm font-bold text-white transition-all duration-200"
        [class]="ciudadLocal()
          ? 'bg-[#E8372C] hover:bg-[#c62d22] shadow-lg shadow-red-900/40 cursor-pointer'
          : 'bg-[#E8372C]/40 cursor-not-allowed'"
        [disabled]="!ciudadLocal()"
        (click)="confirmar()"
        aria-label="Ver planes en la ciudad seleccionada"
      >
        <i class="pi pi-map-marker mr-2 text-sm"></i>
        Ver planes
      </button>

      <button
        class="text-white/35 text-xs hover:text-white/60 transition-colors text-center py-1"
        (click)="cerrar()"
        aria-label="Continuar sin seleccionar ciudad"
      >
        Continuar sin seleccionar
      </button>
    </div>

  </div>
</p-dialog>
